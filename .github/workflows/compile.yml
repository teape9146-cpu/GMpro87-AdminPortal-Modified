name: Compile GMpro Deauther Fixed Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Extract and Prepare Folder
        run: |
          # 1. Ekstrak ZIP ke folder sementara agar tidak berantakan
          unzip -o GMpro87-AdminPortal-Modified.zip -d tmp_extract
          
          # 2. Cari di mana lokasi file .ino utama berada
          # Nama file: GMpro87.devv1.5.ino
          INO_PATH=$(find tmp_extract -name "GMpro87.devv1.5.ino")
          
          # 3. Ambil folder induk dari file .ino tersebut
          INO_DIR=$(dirname "$INO_PATH")
          
          # 4. Pindahkan folder tersebut ke root dan beri nama yang sesuai aturan Arduino
          # Folder harus bernama sama dengan file .ino (GMpro87.devv1.5)
          mv "$INO_DIR" ./GMpro87.devv1.5
          
          # Cek isi folder untuk memastikan struktur internal (src, data, dll) tetap terjaga
          echo "Struktur folder setelah dirapikan:"
          ls -R GMpro87.devv1.5

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Libraries Automatically
        run: |
          # Install SimpleCLI
          arduino-cli lib install "SimpleCLI"
          
          # Install ArduinoJson versi 5.13.5 (Penting: Jangan versi 6/7)
          arduino-cli lib install "ArduinoJson@5.13.5"
          
          # List library untuk memastikan sudah terpasang
          arduino-cli lib list

      - name: Compile GMpro Firmware
        run: |
          # Kompilasi menggunakan SDK Deauther dengan Flash 4MB
          arduino-cli compile --fqbn deauther:esp8266:generic:eesz=4M2M \
          ./GMpro87.devv1.5 --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro87-Deauther-Binary
          path: ./build/*.bin
