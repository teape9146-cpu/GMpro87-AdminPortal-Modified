name: Compile GMpro Deauther Fixed Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Extract Project ZIP
        run: |
          # Mengekstrak file project utama kamu
          unzip -o GMpro87-AdminPortal-Modified.zip -d project_source
          # Memindahkan isi folder hasil ekstrak ke root agar bisa di-compile
          cp -r project_source/* ./

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Libraries Automatically
        run: |
          # Download dan install SimpleCLI versi terbaru
          arduino-cli lib install "SimpleCLI"
          
          # Download dan install ArduinoJson versi 5.13.5 secara otomatis
          # Tanda @5.13.5 sangat penting agar tidak error saat compile Deauther
          arduino-cli lib install "ArduinoJson@5.13.5"
          
          # Tampilkan daftar library untuk memastikan sudah terpasang
          arduino-cli lib list

      - name: Compile GMpro Firmware
        run: |
          # Menggunakan FQBN stabil untuk Deauther
          # Script akan mencari file .ino yang tadi sudah diekstrak
          arduino-cli compile --fqbn deauther:esp8266:generic:eesz=4M2M \
          ./*.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro87-Deauther-Binary
          path: ./build/*.bin
