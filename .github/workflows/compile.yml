name: Compile GMpro Deauther Fixed Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Extract and Prepare Folder
        run: |
          # 1. Buat folder dengan nama yang SAMA PERSIS dengan file .ino utama
          mkdir -p GMpro87.devv1.5
          
          # 2. Ekstrak file ZIP project ke dalam folder tersebut
          # Pastikan file ZIP di repo kamu namanya "GMpro87-AdminPortal-Modified.zip"
          unzip -o GMpro87-AdminPortal-Modified.zip -d GMpro87.devv1.5
          
          # 3. Tarik semua file keluar dari subfolder hasil unzip (jika ada) 
          # Agar file .ino berada tepat di dalam folder GMpro87.devv1.5/
          find GMpro87.devv1.5 -mindepth 2 -type f -exec mv -t GMpro87.devv1.5 {} +
          
          # Cek isi folder untuk memastikan file .ino ada di tempat yang benar
          ls -R GMpro87.devv1.5

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Libraries Automatically
        run: |
          # Install SimpleCLI versi terbaru
          arduino-cli lib install "SimpleCLI"
          
          # Install ArduinoJson versi 5.13.5 (Wajib versi 5 untuk Deauther)
          arduino-cli lib install "ArduinoJson@5.13.5"
          
          # Tampilkan daftar library yang terpasang
          arduino-cli lib list

      - name: Compile GMpro Firmware
        run: |
          # Menggunakan FQBN stabil untuk Deauther (4MB Flash)
          # Proses kompilasi diarahkan ke folder GMpro87.devv1.5
          arduino-cli compile --fqbn deauther:esp8266:generic:eesz=4M2M \
          ./GMpro87.devv1.5 --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro87-Deauther-Binary
          path: ./build/*.bin
